<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>レイカちゃんの お菓子ランキング 発表式</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Mochiy+Pop+One&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#3B2A4A; --pop:#FF5CA8; --gold:#FFC93C; --sky:#5BC8FF; }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:'Zen Maru Gothic',sans-serif;color:var(--ink);
    background:linear-gradient(160deg,#FFE3F1,#FFF6C9 50%,#D6F0FF);
    min-height:100%;display:flex;align-items:center;justify-content:center;
    padding:20px;overflow:hidden;position:relative;
  }
  .stage{max-width:480px;width:100%;text-align:center;position:relative;z-index:2;}

  #start .crown{font-size:56px;display:block;animation:bob 2s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  #start h1{
    font-family:'Mochiy Pop One',sans-serif;font-size:clamp(24px,7vw,34px);
    color:#fff;-webkit-text-stroke:2px var(--pop);
    text-shadow:3px 3px 0 var(--pop);line-height:1.4;margin:10px 0 6px;
  }
  #start p{font-weight:900;color:var(--pop);font-size:18px;margin-bottom:28px;}

  .btn{
    font-family:'Mochiy Pop One',sans-serif;font-size:22px;color:#fff;border:none;
    padding:18px 34px;border-radius:999px;cursor:pointer;
    background:linear-gradient(135deg,#FF9AD0,#FF5CA8);
    box-shadow:0 6px 0 #d63f88, 0 12px 22px rgba(255,92,168,.35);
    transition:transform .08s, box-shadow .08s;
  }
  .btn:active{transform:translateY(4px);box-shadow:0 2px 0 #d63f88;}
  .btn:disabled{opacity:.5;cursor:default;}
  .btn.sky{background:linear-gradient(135deg,#8FE0FF,#34B6F5);box-shadow:0 6px 0 #1f93cf,0 12px 22px rgba(52,182,245,.35);}
  .btn.sky:active{box-shadow:0 2px 0 #1f93cf;}

  #reveal{display:none;}
  .rankbadge{
    font-family:'Mochiy Pop One',sans-serif;font-size:40px;color:#fff;
    width:96px;height:96px;border-radius:30px;margin:0 auto 14px;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 6px 0 rgba(0,0,0,.14);
  }
  .b1{background:linear-gradient(135deg,#FFD95A,#FF9E2C);}
  .b2{background:linear-gradient(135deg,#D9E6F2,#9FB6CC);}
  .b3{background:linear-gradient(135deg,#F0B083,#CC7A45);}
  .b4,.b5,.b6{background:linear-gradient(135deg,#FF9AD0,#FF5CA8);}

  .card{
    background:#fff;border-radius:28px;padding:26px 22px;border:4px solid #fff;
    box-shadow:0 10px 0 rgba(59,42,74,.10),0 18px 30px rgba(255,92,168,.16);
  }
  .card.show{animation:reveal .55s cubic-bezier(.18,1.3,.4,1) both;}
  @keyframes reveal{0%{transform:scale(.4) rotate(-8deg);opacity:0}70%{transform:scale(1.06)}100%{transform:scale(1) rotate(0);opacity:1}}
  .card .emoji{font-size:72px;}
  .card.show .emoji{animation:wiggle .6s ease both;}
  @keyframes wiggle{0%{transform:rotate(0)}25%{transform:rotate(-12deg)}50%{transform:rotate(12deg)}75%{transform:rotate(-6deg)}100%{transform:rotate(0)}}
  .card .snack{font-family:'Mochiy Pop One',sans-serif;font-size:30px;margin-top:8px;}
  .card .maker{font-size:14px;color:#9A86A8;font-weight:700;margin-top:6px;}
  .medal{font-size:34px;margin-top:10px;min-height:40px;}

  /* suspense: hide card during the drumroll */
  .rolling .rankbadge, .rolling .card{visibility:hidden;}
  .rollwrap{display:none;}
  .rolling .rollwrap{display:block;}
  .rolldrum{font-size:80px;animation:shake .12s linear infinite;}
  @keyframes shake{0%{transform:translateX(-4px) rotate(-6deg)}50%{transform:translateX(4px) rotate(6deg)}100%{transform:translateX(-4px) rotate(-6deg)}}
  .rolltext{font-family:'Mochiy Pop One',sans-serif;font-size:24px;color:var(--pop);margin-top:8px;letter-spacing:2px;}

  .drum{font-weight:900;color:var(--pop);font-size:20px;height:26px;margin:10px 0 16px;}
  .controls{margin-top:24px;}
  #champ{font-family:'Mochiy Pop One',sans-serif;font-size:22px;color:var(--gold);margin-bottom:8px;text-shadow:2px 2px 0 rgba(255,158,44,.3);}

  .confetti{position:fixed;top:-20px;width:12px;height:12px;z-index:5;opacity:.95;animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:1}}
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div id="start">
      <span class="crown">👑</span>
      <h1>レイカちゃんの<br>お菓子ランキング</h1>
      <p>～ はっぴょうしき ～ 🥁</p>
      <button class="btn" id="startBtn" onclick="next()">はじめる！</button>
    </div>

    <div id="reveal">
      <div class="rollwrap">
        <div class="rolldrum">🥁</div>
        <div class="rolltext">ダラララララ…</div>
      </div>
      <div class="drum" id="drum"></div>
      <div class="rankbadge" id="badge">6</div>
      <div class="card" id="card">
        <div class="emoji" id="emoji">🥔</div>
        <div class="snack" id="snack">堅あげポテト</div>
        <div class="maker" id="maker">カルビー</div>
        <div class="medal" id="medal"></div>
      </div>
      <div class="controls" id="controls">
        <button class="btn sky" id="nextBtn" onclick="next()">つぎへ ▶</button>
      </div>
    </div>
  </div>

<script>
  const data = [
    {rank:6, snack:"堅あげポテト", maker:"カルビー", emoji:"🥔", badge:"b6", medal:""},
    {rank:5, snack:"ベビースターラーメン", maker:"おやつカンパニー", emoji:"🍜", badge:"b5", medal:""},
    {rank:4, snack:"ハイチュウ", maker:"森永製菓", emoji:"🍬", badge:"b4", medal:""},
    {rank:3, snack:"ポッキー", maker:"グリコ", emoji:"🍫", badge:"b3", medal:"🥉"},
    {rank:2, snack:"プリングルス", maker:"Pringles", emoji:"🥫", badge:"b2", medal:"🥈"},
    {rank:1, snack:"こつぶっこ", maker:"亀田製菓", emoji:"🍘", badge:"b1", medal:"🥇"},
  ];
  let step = -1, busy = false;
  let ctx = null;

  function ac(){ if(!ctx) ctx = new (window.AudioContext||window.webkitAudioContext)(); if(ctx.state==='suspended') ctx.resume(); return ctx; }

  // one snare-ish noise hit
  function snare(t, vol){
    const c = ac();
    const n = 0.045, buf = c.createBuffer(1, c.sampleRate*n, c.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i] = (Math.random()*2-1);
    const src = c.createBufferSource(); src.buffer = buf;
    const bp = c.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1800; bp.Q.value=0.8;
    const g = c.createGain();
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t+n);
    src.connect(bp); bp.connect(g); g.connect(c.destination);
    src.start(t); src.stop(t+n);
  }

  function drumroll(dur){
    const c = ac(), start = c.currentTime + 0.02;
    let t = start, i = 0;
    while(t < start + dur){
      const prog = (t-start)/dur;          // 0 -> 1
      const gap = 0.055 - prog*0.028;      // speeds up
      const vol = 0.12 + prog*0.18;        // gets louder
      snare(t, vol);
      t += gap; i++;
    }
  }

  // cymbal / "jaaan" crash
  function crash(big){
    const c = ac(), t = c.currentTime + 0.01;
    const dur = big ? 1.1 : 0.6;
    const buf = c.createBuffer(1, c.sampleRate*dur, c.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i] = (Math.random()*2-1)*(1 - i/d.length);
    const src = c.createBufferSource(); src.buffer = buf;
    const hp = c.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=4000;
    const g = c.createGain();
    g.gain.setValueAtTime(big?0.45:0.3, t);
    g.gain.exponentialRampToValueAtTime(0.001, t+dur);
    src.connect(hp); hp.connect(g); g.connect(c.destination);
    src.start(t); src.stop(t+dur);
  }

  function fanfare(){
    const c = ac();
    const notes = [523.25, 659.25, 783.99, 1046.5]; // C E G C
    notes.forEach((f, i)=>{
      const t = c.currentTime + 0.05 + i*0.16;
      const o = c.createOscillator(); o.type='triangle'; o.frequency.value=f;
      const g = c.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.3, t+0.03);
      g.gain.exponentialRampToValueAtTime(0.001, t+0.35);
      o.connect(g); g.connect(c.destination);
      o.start(t); o.stop(t+0.4);
    });
  }

  // "パチパチパチ✨" 弾けるような音（線香花火っぽいクラックル）
  function crackleBurst(){
    const c = ac(), t0 = c.currentTime + 0.01;
    // やさしい「ふわっ」とした始まり（大きい「パン」にはしない）
    const sn = 0.12, sbuf = c.createBuffer(1, Math.floor(c.sampleRate*sn), c.sampleRate);
    const sd = sbuf.getChannelData(0);
    for(let i=0;i<sd.length;i++){ const e = Math.sin(Math.PI*i/sd.length); sd[i]=(Math.random()*2-1)*e; }
    const ssrc = c.createBufferSource(); ssrc.buffer = sbuf;
    const slp = c.createBiquadFilter(); slp.type='lowpass'; slp.frequency.value=1400;
    const sg = c.createGain();
    sg.gain.setValueAtTime(0.18, t0);
    sg.gain.exponentialRampToValueAtTime(0.001, t0+sn);
    ssrc.connect(slp); slp.connect(sg); sg.connect(c.destination);
    ssrc.start(t0); ssrc.stop(t0+sn);
    // 「パンパンパン!」と弾ける音をたくさん降らせる
    const count = 48;
    for(let i=0;i<count;i++){
      const t = t0 + 0.04 + Math.random()*1.5;
      const len = 0.05 + Math.random()*0.03;
      const buf = c.createBuffer(1, Math.max(1, Math.floor(c.sampleRate*len)), c.sampleRate);
      const d = buf.getChannelData(0);
      for(let j=0;j<d.length;j++) d[j] = (Math.random()*2-1)*(1 - j/d.length);
      const src = c.createBufferSource(); src.buffer = buf;
      const bp = c.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value = 500 + Math.random()*700; bp.Q.value = 0.9;
      const g = c.createGain();
      const vol = 0.16 + Math.random()*0.18;
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.001, t+len);
      src.connect(bp); bp.connect(g); g.connect(c.destination);
      src.start(t); src.stop(t+len);
    }
  }

  function next(){
    if(busy) return;
    busy = true;
    document.getElementById('start').style.display='none';
    document.getElementById('reveal').style.display='block';
    document.getElementById('startBtn').disabled = true;
    const nb = document.getElementById('nextBtn'); if(nb) nb.disabled = true;

    step++;
    const d = data[step];
    const isFirst = (d.rank===1);
    const rollDur = isFirst ? 1.8 : 1.1;

    // suspense state + drumroll sound
    document.getElementById('reveal').classList.add('rolling');
    document.getElementById('drum').textContent = isFirst ? "★ さいごは…？ ★" : "";
    drumroll(rollDur);

    setTimeout(()=>{
      // reveal!
      document.getElementById('reveal').classList.remove('rolling');
      document.getElementById('drum').textContent = isFirst ? "★ だいいちい！ ★" : "ジャーン！🎉";

      const badge = document.getElementById('badge');
      badge.textContent = d.rank; badge.className = 'rankbadge ' + d.badge;
      document.getElementById('emoji').textContent = d.emoji;
      document.getElementById('snack').textContent = d.snack;
      document.getElementById('maker').textContent = d.maker;
      document.getElementById('medal').textContent = d.medal;

      const card = document.getElementById('card');
      card.classList.remove('show'); void card.offsetWidth; card.classList.add('show');

      if(isFirst){ crackleBurst(); burst(120); }
      else { crash(false); if(d.rank<=3) burst(30); }

      if(isFirst){
        document.getElementById('controls').innerHTML =
          '<div id="champ">🎉 おめでとう！ 🎉</div>'+
          '<button class="btn" onclick="restart()">もういちど 🔁</button>';
      } else {
        const b = document.getElementById('nextBtn'); if(b) b.disabled = false;
      }
      busy = false;
    }, rollDur*1000);
  }

  function restart(){
    step=-1; busy=false;
    document.getElementById('reveal').style.display='none';
    document.getElementById('reveal').classList.remove('rolling');
    document.getElementById('start').style.display='block';
    document.getElementById('startBtn').disabled=false;
    document.getElementById('controls').innerHTML =
      '<button class="btn sky" id="nextBtn" onclick="next()">つぎへ ▶</button>';
  }

  function burst(n){
    const colors=['#FF5CA8','#FFC93C','#5BC8FF','#9DE36A','#C77DFF'];
    for(let i=0;i<n;i++){
      const c=document.createElement('div'); c.className='confetti';
      c.style.left=Math.random()*100+'vw';
      c.style.background=colors[i%colors.length];
      c.style.animationDuration=(2+Math.random()*1.8)+'s';
      c.style.animationDelay=(Math.random()*0.4)+'s';
      if(Math.random()>0.5) c.style.borderRadius='50%';
      c.style.width=c.style.height=(8+Math.random()*8)+'px';
      document.body.appendChild(c);
      setTimeout(()=>c.remove(),4200);
    }
  }
</script>
</body>
</html>
